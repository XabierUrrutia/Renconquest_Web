{% extends "base.html" %}
{% block title %}Iniciar sesión — Reconquest{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Reconquest">
    </div>
    <h1 class="auth-title">Acceso</h1>
    <p class="auth-sub">// Identifícate, Comandante</p>

    {% if error %}
    <div class="form-error">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>Usuario o Email</label>
        <input type="text" name="identifier" placeholder="nombre_usuario / email@..." required autofocus>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit">Iniciar Sesión</button>
    </form>

    <div class="auth-links">
      <a href="{{ url_for('forgot') }}">¿Olvidaste tu contraseña?</a>
      <span>·</span>
      <a href="{{ url_for('register') }}">Crear cuenta</a>
    </div>
  </div>
</div>
{% endblock %}
